<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>مشغل القنوات</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>
<style>
body{margin:0;background:#070707;color:#fff;font-family:Tahoma,Arial}.header{background:#111;padding:14px;text-align:center;color:#ffd700;font-size:20px;font-weight:bold}.player-box{background:#000;position:sticky;top:0;z-index:9}video{width:100%;height:42vh;background:#000}.status{text-align:center;padding:8px;color:#ccc;background:#111;font-size:14px}.controls{display:flex;gap:8px;padding:10px;background:#111;flex-wrap:wrap}button,input{border:0;border-radius:8px;padding:10px;font-size:15px}button{background:#ffd700;color:#000;font-weight:bold;cursor:pointer}input{flex:1;min-width:180px;background:#222;color:#fff}.channels{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:10px}.ch{background:#181818;border:1px solid #333;border-radius:10px;padding:12px;text-align:center;cursor:pointer}.ch.active{border-color:#ffd700;color:#ffd700}.meta{padding:0 12px 12px;color:#aaa;font-size:13px;text-align:center}
</style></head><body>
<div class="header">📺 مشغل القنوات</div><div class="player-box"><video id="video" controls playsinline></video><div id="status" class="status">اختر قناة للتشغيل</div></div><div class="controls"><input id="search" placeholder="بحث عن قناة..."><button onclick="reloadCurrent()">إعادة تحميل</button></div><div class="meta">مشغل خارجي جاهز للهوتسبوت والتطبيق</div><div id="channels" class="channels"></div>
<script>
const BACKEND_URL="";const video=document.getElementById("video"),statusEl=document.getElementById("status"),channelsEl=document.getElementById("channels"),searchInput=document.getElementById("search");let channels=[],currentChannel=null,hls=null,tsPlayer=null,lastTime=0,stuckSince=null,lastReloadAt=0,monitorTimer=null;function setStatus(t){statusEl.textContent=t}function api(p){return `${BACKEND_URL}${p}`}function proxied(u){return api(`/api/stream/proxy?url=${encodeURIComponent(u)}`)}function clearPlayer(){if(hls){try{hls.destroy()}catch(e){}hls=null}if(tsPlayer){try{tsPlayer.unload()}catch(e){}try{tsPlayer.detachMediaElement()}catch(e){}try{tsPlayer.destroy()}catch(e){}tsPlayer=null}video.pause();video.removeAttribute("src");video.load()}function parseM3U(t){const lines=t.split(/\r?\n/),list=[];let name="قناة";for(const line of lines){const l=line.trim();if(!l)continue;if(l.startsWith("#EXTINF")){const i=l.lastIndexOf(",");name=i>=0?l.slice(i+1).trim():"قناة"}else if(!l.startsWith("#"))list.push({name,url:l})}return list}async function loadChannels(){setStatus("جاري تحميل القنوات...");const r=await fetch(api("/api/m3u/default"));if(!r.ok)throw new Error("فشل تحميل قائمة القنوات");channels=parseM3U(await r.text());renderChannels();setStatus("اختر قناة للتشغيل")}function renderChannels(){const q=searchInput.value.trim().toLowerCase();channelsEl.innerHTML="";channels.filter(c=>c.name.toLowerCase().includes(q)).forEach(ch=>{const d=document.createElement("div");d.className="ch"+(currentChannel&&currentChannel.url===ch.url?" active":"");d.textContent=ch.name;d.onclick=()=>playChannel(ch);channelsEl.appendChild(d)})}async function detectType(u){try{const r=await fetch(api(`/api/stream/probe?url=${encodeURIComponent(u)}`));const d=await r.json();return d.type==="ts"?"ts":"hls"}catch(e){return u.toLowerCase().includes(".m3u8")?"hls":"ts"}}async function playChannel(ch){currentChannel=ch;localStorage.setItem("last_channel_url",ch.url);renderChannels();clearPlayer();setStatus("جاري تجهيز البث...");const type=await detectType(ch.url),url=proxied(ch.url);if(type==="hls"){if(Hls.isSupported()){hls=new Hls({enableWorker:true,lowLatencyMode:false,liveDurationInfinity:true,liveSyncDurationCount:8,liveMaxLatencyDurationCount:30,maxBufferLength:90,maxMaxBufferLength:180,backBufferLength:60,manifestLoadingTimeOut:30000,fragLoadingTimeOut:45000,levelLoadingTimeOut:30000,manifestLoadingMaxRetry:15,fragLoadingMaxRetry:15,levelLoadingMaxRetry:15,manifestLoadingRetryDelay:2000,fragLoadingRetryDelay:2000,levelLoadingRetryDelay:2000});hls.loadSource(url);hls.attachMedia(video);hls.on(Hls.Events.MANIFEST_PARSED,()=>{video.play().then(()=>setStatus("البث يعمل الآن")).catch(()=>setStatus("اضغط تشغيل"))});hls.on(Hls.Events.ERROR,(e,data)=>{if(!data.fatal)return;if(data.type===Hls.ErrorTypes.NETWORK_ERROR){setStatus("ضعف بالشبكة... محاولة إصلاح");try{hls.startLoad()}catch(e){}return}if(data.type===Hls.ErrorTypes.MEDIA_ERROR){setStatus("إصلاح الفيديو...");try{hls.recoverMediaError()}catch(e){}return}softReload()})}else if(video.canPlayType("application/vnd.apple.mpegurl")){video.src=url;video.play().then(()=>setStatus("البث يعمل الآن")).catch(()=>setStatus("اضغط تشغيل"))}else setStatus("هذا الجهاز لا يدعم HLS")}else{if(window.mpegts&&mpegts.getFeatureList().mseLivePlayback){tsPlayer=mpegts.createPlayer({type:"mpegts",isLive:true,url},{enableStashBuffer:true,stashInitialSize:1024*1024*2,liveBufferLatencyChasing:false});tsPlayer.attachMediaElement(video);tsPlayer.load();video.play().then(()=>setStatus("البث يعمل الآن")).catch(()=>setStatus("اضغط تشغيل"))}else{video.src=url;video.play().then(()=>setStatus("البث يعمل الآن")).catch(()=>setStatus("اضغط تشغيل"))}}startMonitor()}function startMonitor(){if(monitorTimer)clearInterval(monitorTimer);lastTime=0;stuckSince=null;monitorTimer=setInterval(()=>{if(!currentChannel||video.paused)return;const now=Date.now();if(video.currentTime===lastTime){if(!stuckSince)stuckSince=now;const stuckFor=now-stuckSince;if(stuckFor>25000&&hls){setStatus("البث متوقف مؤقتًا... محاولة إصلاح");try{hls.startLoad()}catch(e){}}if(stuckFor>60000)softReload()}else{stuckSince=null;lastTime=video.currentTime;setStatus("البث يعمل الآن")}},5000)}function softReload(){const now=Date.now();if(now-lastReloadAt<90000){setStatus("البث ضعيف... ننتظر قبل إعادة المحاولة");return}lastReloadAt=now;if(currentChannel){setStatus("إعادة اتصال هادئة...");playChannel(currentChannel)}}function reloadCurrent(){lastReloadAt=0;if(currentChannel)playChannel(currentChannel)}searchInput.addEventListener("input",renderChannels);loadChannels().catch(e=>{console.error(e);setStatus("فشل تحميل القنوات. تأكد أن السيرفر يعمل")});
</script></body></html>
